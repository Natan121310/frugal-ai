<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frugal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-2: #f5f5f3;
      --bg-3: #efefed;
      --text: #1a1a18;
      --text-2: #6b6b67;
      --text-3: #9e9e9a;
      --border: rgba(0,0,0,0.1);
      --border-2: rgba(0,0,0,0.18);
      --green: #1d9e75;
      --green-bg: #e1f5ee;
      --green-border: rgba(29,158,117,0.25);
      --red-bg: #fcebeb;
      --red: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-2: #252523;
        --bg-3: #2e2e2b;
        --text: #f0f0ec;
        --text-2: #a0a09a;
        --text-3: #6a6a64;
        --border: rgba(255,255,255,0.1);
        --border-2: rgba(255,255,255,0.18);
        --green: #5dcaa5;
        --green-bg: rgba(29,158,117,0.15);
        --green-border: rgba(29,158,117,0.3);
        --red-bg: rgba(163,45,45,0.18);
        --red: #f09595;
      }
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

    body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    .shell {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0 1rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 0 1rem;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      background: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 16px; height: 16px; stroke: var(--bg); fill: none; stroke-width: 2; stroke-linecap: round; }
    .brand-name { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
    .brand-tag { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 1px; }

    .savings-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--green-bg);
      border: 0.5px solid var(--green-border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      color: var(--green);
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .stat { text-align: center; }
    .stat-val { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
    .stat-val.green { color: var(--green); }
    .stat-lbl { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-3);
      text-align: center;
      padding: 3rem 2rem;
    }

    .empty-icon { font-size: 36px; opacity: .4; }
    .empty h2 { font-size: 18px; font-weight: 700; color: var(--text-2); }
    .empty p { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 300; line-height: 1.7; max-width: 320px; }

    /* Message rows */
    .msg { display: flex; flex-direction: column; }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.65;
      max-width: 85%;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--text);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: var(--bg-2);
      color: var(--text);
      border: 0.5px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
    }

    .opt-tag {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .04em;
    }

    .saved-tag { color: var(--green); font-weight: 500; }

    .step-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
    }

    .typing-dots { display: flex; gap: 3px; }
    .typing-dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--text-3);
      animation: tdot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 0 1.25rem;
      border-top: 0.5px solid var(--border);
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    .input-wrap {
      flex: 1;
      background: var(--bg);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      transition: border-color .15s;
    }

    .input-wrap:focus-within { border-color: var(--text-3); }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      resize: none;
      line-height: 1.55;
      min-height: 20px;
      max-height: 120px;
    }

    textarea::placeholder { color: var(--text-3); font-style: italic; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
      align-self: flex-end;
    }

    .send-btn:hover { opacity: .8; }
    .send-btn:active { transform: scale(.96); }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .hint {
      font-size: 10px;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Error toast ── */
    .error-toast {
      background: var(--red-bg);
      color: var(--red);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      line-height: 1.5;
      display: none;
      margin-bottom: 8px;
    }

    .error-toast.visible { display: block; }

    /* ── Optimized prompt pill (expandable) ── */
    details {
      margin-top: 4px;
    }

    details summary {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }

    details summary::-webkit-details-marker { display: none; }

    details summary::before {
      content: '▶';
      font-size: 8px;
      transition: transform .15s;
    }

    details[open] summary::before { transform: rotate(90deg); }

    .opt-preview {
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--bg-3);
      border-radius: var(--radius-md);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 85%;
    }
  </style>
</head>
<body>

<div class="shell">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div>
        <div class="brand-name">Frugal AI</div>
        <div class="brand-tag">auto-optimizes every prompt</div>
      </div>
    </div>
    <div class="savings-badge">
      <span class="dot"></span>
      <span id="pctSaved">0%</span> saved
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statSent">0</div>
      <div class="stat-lbl">tokens sent</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="statSaved">0</div>
      <div class="stat-lbl">tokens saved</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statMsgs">0</div>
      <div class="stat-lbl">messages</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">⚡</div>
      <h2>Talk naturally.</h2>
      <p>Frugal AI compresses every message before sending to Claude — same answers, fewer tokens, lower cost.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="error-toast" id="errorToast"></div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Just ramble... I'll compress it before sending to Claude."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
  const PROXY = '/api/chat';
  const MODEL = 'claude-haiku-4-5-20251001';

  let totalSent = 0, totalSaved = 0, msgCount = 0;
  let history = [];
  let busy = false;

  function tok(str) { return Math.round(str.length / 4); }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function updateStats() {
    document.getElementById('statSent').textContent = totalSent;
    document.getElementById('statSaved').textContent = totalSaved;
    document.getElementById('statMsgs').textContent = msgCount;
    const total = totalSent + totalSaved;
    const pct = total > 0 ? Math.round(totalSaved / total * 100) : 0;
    document.getElementById('pctSaved').textContent = pct + '%';
  }

  function showError(msg) {
    const t = document.getElementById('errorToast');
    t.textContent = '⚠ ' + msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 5000);
  }

  function removeEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function addUserMsg(text) {
    removeEmpty();
    const m = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    m.appendChild(d);
    scrollBottom();
  }

  function addTyping(id, label) {
    const m = document.getElementById('messages');
    const d = document.createElement('div');
    d.id = id;
    d.className = 'msg assistant';
    d.innerHTML = `
      <div class="step-label">⚙ ${label}</div>
      <div class="typing">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    m.appendChild(d);
    scrollBottom();
  }

  function removeEl(id) { const e = document.getElementById(id); if (e) e.remove(); }

  function addAssistantMsg(answer, optimized, rawTok, optTok) {
    const m = document.getElementById('messages');
    const saved = Math.max(0, rawTok - optTok);
    const d = document.createElement('div');
    d.className = 'msg assistant';

    let metaHtml = `<div class="msg-meta">`;
    if (saved > 0) metaHtml += `<span class="opt-tag">optimized</span>`;
    metaHtml += `<span>${optTok} tokens</span>`;
    if (saved > 0) metaHtml += `<span class="saved-tag">saved ${saved}</span>`;
    metaHtml += `</div>`;

    let optHtml = '';
    if (saved > 0 && optimized && optimized !== 'RAW') {
      optHtml = `
        <details>
          <summary>see optimized prompt</summary>
          <div class="opt-preview">${escHtml(optimized)}</div>
        </details>`;
    }

    d.innerHTML = `
      <div class="step-label">✦ Claude's answer</div>
      <div class="bubble">${escHtml(answer)}</div>
      ${metaHtml}
      ${optHtml}`;
    m.appendChild(d);
    scrollBottom();
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function callProxy(system, messages, maxTokens = 800) {
    const body = { model: MODEL, max_tokens: maxTokens, messages };
    if (system) body.system = system;

    const r = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${r.status}`);
    }

    const data = await r.json();
    return data.content?.find(b => b.type === 'text')?.text || '';
  }

  async function sendMessage() {
    if (busy) return;
    const inp = document.getElementById('userInput');
    const raw = inp.value.trim();
    if (!raw) return;

    busy = true;
    inp.value = '';
    inp.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    const rawTok = tok(raw);
    addUserMsg(raw);
    msgCount++;

    addTyping('think-opt', 'Step 1 — optimizing your prompt...');

    let optimized = raw;
    let optTok = rawTok;

    try {
      const optSys = `You are a prompt optimizer. Compress the user's message into the most token-efficient version that preserves ALL meaning and intent. Strip filler, hedging, repetition. Be direct and imperative. Return ONLY the optimized prompt text — no explanation, no preamble, nothing else.`;
      optimized = (await callProxy(optSys, [{ role: 'user', content: raw }], 200)).trim();
      optTok = tok(optimized);
    } catch (e) {
      optimized = raw;
    }

    removeEl('think-opt');

    const saved = Math.max(0, rawTok - optTok);
    totalSaved += saved;
    totalSent += optTok;
    updateStats();

    history.push({ role: 'user', content: optimized });

    addTyping('think-ans', 'Step 2 — getting Claude\'s answer...');

    let answer = '';
    try {
      const mainSys = `You are a helpful, concise assistant. Answer clearly and directly. Avoid padding or filler.`;
      answer = await callProxy(mainSys, history, 800);
      history.push({ role: 'assistant', content: answer });
    } catch (e) {
      answer = 'Something went wrong: ' + e.message;
      showError(e.message);
      history.pop();
    }

    removeEl('think-ans');
    addAssistantMsg(answer, optimized, rawTok, optTok);

    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
  }
</script>
</body>
</html>
